<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: Arial, sans-serif;
}

body{
  height:100vh;
  background:url('https://i.postimg.cc/TY6bzHK2/6073633143450700771.jpg') no-repeat center 30%/cover;
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
  color:white;
}

/* BLUR OVERLAY */
.overlay{
  backdrop-filter: blur(4px);
  background:rgba(0,0,0,0.5);
  width:100%;
  height:100%;
  position:absolute;
  top:0;
  left:0;
}

.container{
  position:relative;
  z-index:2;
  padding:20px;
}

h1{
  font-size:36px;
  font-weight:bold;
}

.sub{
  font-size:20px;
  margin:10px 0;
}

.timer{
  font-size:60px;
  font-weight:bold;
  margin-top:10px;
}

.circle-img{
  width:180px;
  height:180px;
  border-radius:50%;
  overflow:hidden;
  margin:20px auto;
  border:5px solid white;
}

.circle-img img{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* BUTTON POPUP ANIMATION */
.btn{
  display:inline-block;
  padding:15px 25px;
  background:#0ea5a5;
  border-radius:10px;
  font-size:18px;
  font-weight:bold;
  text-decoration:none;
  color:white;
  margin-top:15px;
  animation:popup 1.5s infinite;
}

@keyframes popup{
  0%{transform:scale(1);}
  50%{transform:scale(1.12);}
  100%{transform:scale(1);}
}

.desc{
  margin-top:20px;
  font-size:16px;
  line-height:1.5;
}
</style>

<body>

<div class="overlay"></div>

<div class="container">
  
  <h1>𝐕𝐈𝐊𝐑𝐀𝐌 𝐒𝐈𝐍𝐆𝐇 ™</h1>
  <div class="sub">❤️ Trusted Prerdiction Insights ❤️</div>

  <div class="timer" id="count">50</div>
  <div>Seconds Left</div>

  <div class="circle-img">
    <img src="https://i.postimg.cc/TY6bzHK2/6073633143450700771.jpg">
  </div>

  <a href="https://t.me/+9cfJhmKn_1AwZmI9" class="btn">
    JOIN THE OFFICIAL CHANNEL 🚀
  </a>

  <div class="desc">
    Actionable tips, transparent updates, and learning-focused guidance
  </div>

</div>

<script>
let time = 50;
let count = document.getElementById("count");

setInterval(()=>{
  if(time > 0){
    time--;
    count.innerText = time;
  }
},1000);
</script>

</body>
